name: build-and-deploy

# Example JSON -> SHN -> deploy pipeline.
#   1. build-content: run `fiesta build` (the ik-fiesta-collab image) against the
#      JSON project in content/, producing the SHN/txt server data.
#   2. deploy: ship that data + docker-compose.yml to a host over SSH, write a
#      .env from secrets, and `docker compose up -d` the full stack.
#
# Clone, drop your project into content/, set the secrets/vars below, and adjust
# to taste. Nothing here is Fiesta-version-specific.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  # Which environment in your fiesta project to build (mimir.json env name).
  FIESTA_ENV: ${{ vars.FIESTA_ENV || 'server' }}

jobs:
  build-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Turn the git-tracked JSON tables into SHN/txt with the fiesta toolkit.
      # The image is published by ik-fiesta-collab's CI. content/ is your project
      # (where mimir.json lives); build output lands in content/build/<env>/.
      - name: Build content (JSON -> SHN/txt)
        run: |
          docker run --rm -v "${{ github.workspace }}/content:/project" \
            ghcr.io/${{ github.repository_owner }}/ik-fiesta-collab:latest \
            build --env "$FIESTA_ENV"

      # Package the built data. Adjust the source path to your project's build
      # layout (content/build/<env>/ by default).
      - name: Package built content
        run: tar -czf content-build.tar.gz -C "content/build/$FIESTA_ENV" .

      - uses: actions/upload-artifact@v4
        with:
          name: content-build
          path: content-build.tar.gz

  deploy:
    needs: build-content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: content-build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship compose + content to the host
        run: |
          SSH="ssh -i ~/.ssh/id_deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          SCP="scp -i ~/.ssh/id_deploy"
          DEST='${{ secrets.DEPLOY_PATH }}'
          $SSH "mkdir -p '$DEST'"
          $SCP docker-compose.yml content-build.tar.gz "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$DEST/"
          # Unpack the freshly built data into the host's ServerSource/9Data.
          # (The host supplies the BYO exes; this refreshes the game data.)
          $SSH "mkdir -p '${{ secrets.FIESTA_SERVER }}/9Data' && tar -xzf '$DEST/content-build.tar.gz' -C '${{ secrets.FIESTA_SERVER }}/9Data'"

      - name: Write .env from secrets
        run: |
          SSH="ssh -i ~/.ssh/id_deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          DEST='${{ secrets.DEPLOY_PATH }}'
          $SSH "cat > '$DEST/.env'" <<EOF
          COMPOSE_PROFILES=bundled-sql
          FIESTA_SERVER=${{ secrets.FIESTA_SERVER }}
          PUBLIC_IP=${{ secrets.PUBLIC_IP }}
          SA_PASSWORD=${{ secrets.SA_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          API_URL=${{ vars.API_URL }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          EOF

      - name: Deploy
        run: |
          SSH="ssh -i ~/.ssh/id_deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          DEST='${{ secrets.DEPLOY_PATH }}'
          # If your GHCR packages are private, add a `docker login ghcr.io` here
          # (e.g. with a GHCR_TOKEN secret) before the pull.
          $SSH "cd '$DEST' && docker compose pull && docker compose up -d"
