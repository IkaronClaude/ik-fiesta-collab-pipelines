name: build-and-deploy

# Example JSON -> SHN -> deploy pipeline.
#   1. build-content: run `fiesta build` (the ik-fiesta-collab image) against the
#      JSON project in content/, producing the SHN/txt server data.
#   2. deploy: ship that data + docker-compose.yml to a host over SSH, write a
#      .env from secrets, and `docker compose up -d` the full stack.
#
# Clone, drop your project into content/, set the secrets/vars below, and adjust
# to taste. Nothing here is Fiesta-version-specific.

on:
  # Manual trigger — run it from the Actions tab once you've added your project
  # to content/ (and set the secrets/vars). Not on push, so a fresh clone with
  # the placeholder content/ doesn't auto-fail. Add a `push:` trigger yourself
  # for CD once your content lives here.
  workflow_dispatch:

env:
  # Which environment in your fiesta project to build (fiesta.json env name).
  FIESTA_ENV: ${{ vars.FIESTA_ENV || 'server' }}

jobs:
  build-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Guard: this repo ships an empty content/ placeholder. Fail early with a
      # clear message (rather than the toolkit's "not a fiesta project" error) if
      # you haven't added your project yet.
      - name: Check content/ has a project
        run: |
          if [ ! -f content/fiesta.json ]; then
            echo "::error::No content/fiesta.json found. Add your fiesta project to content/ (see content/README.md) before running this pipeline."
            exit 1
          fi

      # Turn the git-tracked JSON tables into SHN/txt with the fiesta toolkit.
      # The image is published by ik-fiesta-collab's CI. content/ is your project
      # (where fiesta.json lives); build output lands in content/build/<env>/.
      - name: Build content (JSON -> SHN/txt)
        run: |
          docker run --rm -v "${{ github.workspace }}/content:/project" \
            ghcr.io/ikaronclaude/ik-fiesta-collab:latest \
            build --env "$FIESTA_ENV"

      # Package the built data. Adjust the source path to your project's build
      # layout (content/build/<env>/ by default).
      - name: Package built content
        run: tar -czf content-build.tar.gz -C "content/build/$FIESTA_ENV" .

      - uses: actions/upload-artifact@v4
        with:
          name: content-build
          path: content-build.tar.gz

  deploy:
    needs: build-content
    runs-on: ubuntu-latest
    # Secrets/vars are exposed as env vars so the shell expands them — no inline
    # ${{ secrets.* }} inside run: scripts (avoids shell-injection + log leaks).
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      FIESTA_SERVER: ${{ secrets.FIESTA_SERVER }}
      PUBLIC_IP: ${{ secrets.PUBLIC_IP }}
      SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      API_URL: ${{ vars.API_URL }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: content-build

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship compose + content to the host
        run: |
          REMOTE="$SSH_USER@$SSH_HOST"
          ssh -i ~/.ssh/id_deploy "$REMOTE" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/id_deploy docker-compose.yml content-build.tar.gz "$REMOTE:$DEPLOY_PATH/"
          # Unpack the freshly built data into the host's ServerSource/9Data
          # (the host supplies the BYO exes; this just refreshes the game data).
          ssh -i ~/.ssh/id_deploy "$REMOTE" "mkdir -p '$FIESTA_SERVER/9Data' && tar -xzf '$DEPLOY_PATH/content-build.tar.gz' -C '$FIESTA_SERVER/9Data'"

      - name: Write .env on the host
        run: |
          umask 077
          {
            printf '%s\n' "COMPOSE_PROFILES=bundled-sql"
            printf '%s\n' "FIESTA_SERVER=$FIESTA_SERVER"
            printf '%s\n' "PUBLIC_IP=$PUBLIC_IP"
            printf '%s\n' "SA_PASSWORD=$SA_PASSWORD"
            printf '%s\n' "JWT_SECRET=$JWT_SECRET"
            printf '%s\n' "API_URL=$API_URL"
            printf '%s\n' "CORS_ORIGINS=$CORS_ORIGINS"
          } | ssh -i ~/.ssh/id_deploy "$SSH_USER@$SSH_HOST" "cat > '$DEPLOY_PATH/.env'"

      - name: Deploy
        run: |
          # If your GHCR packages are private, add `docker login ghcr.io` here
          # (e.g. a GHCR_TOKEN secret) before the pull.
          ssh -i ~/.ssh/id_deploy "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_PATH' && docker compose pull && docker compose up -d"
